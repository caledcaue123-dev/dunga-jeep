<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do seu Jeep - Dunga Jeep</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4 pb-10">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700 text-center space-y-6">
        <div>
            <h1 class="text-xl font-bold tracking-wider text-amber-400">DUNGA JEEP</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Acompanhamento de Serviço</p>
        </div>

        <!-- DADOS DO CARRO E DESCRIÇÃO -->
        <div class="bg-slate-850 p-4 rounded-xl border border-slate-700 space-y-3 text-left">
            <div>
                <h2 id="txt-modelo" class="text-lg font-bold text-white text-center">---</h2>
                <p id="txt-placa" class="text-sm text-slate-400 font-mono text-center">Placa: ---</p>
            </div>
            
            <div class="border-t border-slate-700 pt-3">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Serviços Realizados:</p>
                <p id="txt-descricao" class="text-sm text-slate-300 italic">Nenhuma descrição informada.</p>
            </div>
            
            <p id="txt-previsao" class="text-xs text-slate-400 mt-2 text-center pt-2">Previsão de entrega: ---</p>
        </div>

        <!-- STATUS ATUAL -->
        <div class="space-y-2">
            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider text-left">Status Atual:</p>
            <div id="status-box" class="p-4 rounded-xl text-lg font-bold uppercase tracking-wide shadow-inner">
                Carregando...
            </div>
        </div>

        <!-- FINANCEIRO DO CLIENTE -->
        <div class="bg-slate-850 p-4 rounded-xl border border-slate-700 text-left space-y-2">
            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Resumo Financeiro:</p>
            <div class="flex justify-between items-center">
                <span class="text-sm text-slate-300">Valor Total:</span>
                <span id="txt-valor" class="text-base font-bold text-white">R$ 0,00</span>
            </div>
            <div class="flex justify-between items-center pb-2">
                <span class="text-sm text-slate-300">Situação:</span>
                <span id="txt-pagamento" class="text-xs font-bold px-2 py-1 rounded">---</span>
            </div>

            <!-- BOTÃO PIX (Aparece apenas se estiver pendente) -->
            <div id="area-pagamento" class="hidden border-t border-slate-700 pt-4 mt-2">
                <button onclick="solicitarPix()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 shadow-lg transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Pagar com PIX
                </button>
            </div>
        </div>

    </div>

    <script>
        // Captura os dados da URL
        const params = new URLSearchParams(window.location.search);
        const modelo = params.get('m') || "Não informado";
        const placa = params.get('p') || "---";
        const status = params.get('s') || "fila";
        const previsao = params.get('d') || "---";
        const valor = params.get('v') || "0.00";
        const pagamento = params.get('pg') || "pendente";
        const descricao = params.get('desc'); // Captura a descrição

        // Formatação
        const valorFormatado = parseFloat(valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        
        // Preenchimento
        document.getElementById('txt-modelo').innerText = modelo;
        document.getElementById('txt-placa').innerText = `Placa: ${placa}`;
        document.getElementById('txt-previsao').innerText = `Previsão de entrega: ${previsao}`;
        document.getElementById('txt-valor').innerText = `R$ ${valorFormatado}`;
        
        if (descricao) {
            document.getElementById('txt-descricao').innerText = descricao;
        }

        // Configura o Status Visual
        const statusBox = document.getElementById('status-box');
        if (status === 'fila') {
            statusBox.innerText = "⏳ Na Fila de Espera";
            statusBox.className = "p-4 rounded-xl text-lg font-bold uppercase tracking-wide bg-amber-500/20 text-amber-400 border border-amber-500/30";
        } else if (status === 'oficina') {
            statusBox.innerText = "🔧 Em Manutenção";
            statusBox.className = "p-4 rounded-xl text-lg font-bold uppercase tracking-wide bg-blue-500/20 text-blue-400 border border-blue-500/30";
        } else if (status === 'pronto') {
            statusBox.innerText = "✅ Pronto para Retirar";
            statusBox.className = "p-4 rounded-xl text-lg font-bold uppercase tracking-wide bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
        }

        // Configura o Pagamento Visual e Botão PIX
        const pagBadge = document.getElementById('txt-pagamento');
        if (pagamento === 'pago') {
            pagBadge.innerText = "PAGO";
            pagBadge.className = "text-xs font-bold px-2 py-1 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
        } else {
            pagBadge.innerText = "AGUARDANDO PAGAMENTO";
            pagBadge.className = "text-xs font-bold px-2 py-1 rounded bg-red-500/20 text-red-400 border border-red-500/30";
            
            // Mostra o botão do PIX se estiver pendente
            document.getElementById('area-pagamento').classList.remove('hidden');
        }

        // Função do Botão PIX (Por enquanto envia WhatsApp para você)
        function solicitarPix() {
            const numeroDono = "SEU_NUMERO_AQUI"; // COLOQUE SEU NÚMERO COM DDD AQUI (Ex: 5581999999999)
            const mensagem = `Olá! Vi o link do meu Veículo (${modelo}) e gostaria de realizar o pagamento do valor de R$ ${valorFormatado} via PIX/Cartão. Pode me enviar os dados?`;
            window.open(`https://wa.me/${numeroDono}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }
    </script>
</body>
</html>
